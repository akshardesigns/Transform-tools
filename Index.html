<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transform Tool</title>

<style>
body{
  margin:0;
  background:#f4f6f8;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.topbar{
  width:100%;
  padding:12px 20px;
  background:white;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
  display:flex;
  gap:10px;
  align-items:center;
}

.workspace{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  position:relative;
}

canvas{
  display:block;
  max-width:100%;
}

.handle{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#2563eb;
  border:2px solid white;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  transform:translate(-50%,-50%);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <input type="file" id="upload">
</div>

<div class="workspace" id="wrap">
  <canvas id="c"></canvas>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const wrap = document.getElementById("wrap");

let img = new Image();
let pts = [];
let active = null;

function init(w,h){
  pts = [
    {x:0,y:0},
    {x:w,y:0},
    {x:w,y:h},
    {x:0,y:h}
  ];

  pts.forEach(p=>{
    const el = document.createElement("div");
    el.className="handle";
    wrap.appendChild(el);
    p.el = el;
    el.onmousedown = ()=> active = p;
  });

  updateUI();
}

function updateUI(){
  pts.forEach(p=>{
    p.el.style.left = p.x+"px";
    p.el.style.top = p.y+"px";
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawTri(img,
    [0,0, img.width,0, img.width,img.height],
    [pts[0].x,pts[0].y, pts[1].x,pts[1].y, pts[2].x,pts[2].y]
  );

  drawTri(img,
    [0,0, img.width,img.height, 0,img.height],
    [pts[0].x,pts[0].y, pts[2].x,pts[2].y, pts[3].x,pts[3].y]
  );
}

function drawTri(img,src,dst){
  ctx.save();

  const [sx0,sy0,sx1,sy1,sx2,sy2] = src;
  const [dx0,dy0,dx1,dy1,dx2,dy2] = dst;

  const denom = sx0*(sy1-sy2)+sx1*(sy2-sy0)+sx2*(sy0-sy1);

  const a = (dx0*(sy1-sy2)+dx1*(sy2-sy0)+dx2*(sy0-sy1))/denom;
  const b = (dy0*(sy1-sy2)+dy1*(sy2-sy0)+dy2*(sy0-sy1))/denom;
  const c = (dx0*(sx2-sx1)+dx1*(sx0-sx2)+dx2*(sx1-sx0))/denom;
  const d = (dy0*(sx2-sx1)+dy1*(sx0-sx2)+dy2*(sx1-sx0))/denom;
  const e = (dx0*(sx1*sy2-sx2*sy1)+dx1*(sx2*sy0-sx0*sy2)+dx2*(sx0*sy1-sx1*sy0))/denom;
  const f = (dy0*(sx1*sy2-sx2*sy1)+dy1*(sx2*sy0-sx0*sy2)+dy2*(sx0*sy1-sx1*sy0))/denom;

  ctx.transform(a,b,c,d,e,f);

  ctx.beginPath();
  ctx.moveTo(sx0,sy0);
  ctx.lineTo(sx1,sy1);
  ctx.lineTo(sx2,sy2);
  ctx.closePath();
  ctx.clip();

  ctx.drawImage(img,0,0);

  ctx.restore();
}

document.onmousemove = e=>{
  if(!active) return;
  const r = canvas.getBoundingClientRect();
  active.x = e.clientX - r.left;
  active.y = e.clientY - r.top;
  updateUI();
  draw();
};

document.onmouseup = ()=> active=null;

upload.onchange = e=>{
  const f = e.target.files[0];
  if(!f) return;

  const rd = new FileReader();
  rd.onload = ()=>{
    img.onload = ()=>{
      canvas.width = img.width;
      canvas.height = img.height;
      init(img.width,img.height);
      draw();
    }
    img.src = rd.result;
  }
  rd.readAsDataURL(f);
};
</script>

</body>
</html>
